<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Founder Page — Backdoor Video Signal</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #000;
    color: #fff;
    padding: 32px 20px 80px;
  }
  .wrap { max-width: 560px; margin: 0 auto; }
  h1 { font-size: 20px; margin: 0 0 24px; }
  .card {
    background: #111;
    border: 1px solid #262626;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #9ca3af;
    margin-bottom: 8px;
  }
  .blurb { font-size: 16px; line-height: 1.5; }
  .confidence-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .confidence-score {
    font-size: 28px;
    font-weight: 700;
  }
  .confidence-reasoning {
    font-size: 14px;
    color: #9ca3af;
    line-height: 1.4;
  }
  button {
    background: #2563eb;
    color: #fff;
    border: none;
    padding: 12px 20px;
    border-radius: 999px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  button:disabled { opacity: 0.6; cursor: default; }
  .video-gate {
    font-size: 14px;
    color: #9ca3af;
  }
  video {
    display: block;
    max-width: 240px;
    max-height: 320px;
    width: 100%;
    border-radius: 8px;
    margin-top: 12px;
    background: #000;
  }
  .error { color: #f87171; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Founder Page</h1>
  <div id="content">Loading…</div>
</div>

<script>
// Minimal founder-facing view. No build step, no framework — this is a demo.
// Reads ?session=<id>, fetches the founder-safe fields from the backend, and
// only offers the video for playback if confidence cleared the threshold
// AND the founder explicitly opts in via the toggle below.

const params = new URLSearchParams(window.location.search);
const sessionId = params.get("session");
const contentEl = document.getElementById("content");

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

async function load() {
  if (!sessionId) {
    contentEl.innerHTML = '<p class="error">No session specified. Append ?session=&lt;id&gt; to the URL.</p>';
    return;
  }

  let data;
  try {
    const res = await fetch(`/api/session/${sessionId}`);
    if (!res.ok) throw new Error((await res.json()).error || `HTTP ${res.status}`);
    data = await res.json();
  } catch (err) {
    contentEl.innerHTML = `<p class="error">Failed to load session: ${escapeHtml(err.message)}</p>`;
    return;
  }

  const videoSectionHtml = data.videoEligible
    ? `
      <div class="card">
        <div class="label">Video review</div>
        <p class="video-gate">Confidence cleared the ${data.confidenceThreshold} threshold — you may review the candidate's actual video.</p>
        <button id="review-toggle">Review video</button>
        <div id="video-slot"></div>
      </div>`
    : `
      <div class="card">
        <div class="label">Video review</div>
        <p class="video-gate">Video not shown — confidence score is below the ${data.confidenceThreshold} review threshold.</p>
      </div>`;

  contentEl.innerHTML = `
    <div class="card">
      <div class="label">Candidate's summary</div>
      <div class="blurb">${escapeHtml(data.founder_blurb)}</div>
    </div>
    <div class="card">
      <div class="label">Confidence</div>
      <div class="confidence-row">
        <div class="confidence-score">${data.confidence_score}</div>
        <div class="confidence-reasoning">${escapeHtml(data.confidence_reasoning)}</div>
      </div>
    </div>
    ${videoSectionHtml}
  `;

  const toggleBtn = document.getElementById("review-toggle");
  if (toggleBtn) {
    toggleBtn.addEventListener("click", () => {
      const slot = document.getElementById("video-slot");
      slot.innerHTML = `<video controls autoplay src="/api/session/${sessionId}/video"></video>`;
      toggleBtn.disabled = true;
      toggleBtn.textContent = "Reviewing…";

      // Reset the button once playback actually finishes, instead of
      // leaving it stuck on "Reviewing…" forever — lets the founder rewind
      // or rewatch by pressing it again.
      const videoEl = slot.querySelector("video");
      videoEl.addEventListener("ended", () => {
        toggleBtn.disabled = false;
        toggleBtn.textContent = "Review video";
      });
    });
  }
}

load();
</script>
</body>
</html>
